<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James Cochran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0c;
      --surface:   #111116;
      --border:    rgba(255,255,255,0.07);
      --text:      #e2e2e8;
      --muted:     #5a5a6e;
      --accent:    #8b9fc4;
      --accent-dim:rgba(139,159,196,0.15);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Subtle vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: rise 0.6s ease both;
    }

    /* Avatar */
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      filter: grayscale(20%) brightness(0.9);
      border: 1px solid var(--border);
      margin-bottom: 28px;
      transition: filter 0.3s;
    }
    .avatar:hover { filter: grayscale(0%) brightness(1); }

    /* Name */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(28px, 7vw, 38px);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--muted);
      margin: 0 auto 28px;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 48px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      text-align: center;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      background: transparent;
      transition: all 0.22s;
    }

    .link-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.03);
    }

    .link-btn.primary {
      color: var(--accent);
      border-color: rgba(139,159,196,0.25);
      background: var(--accent-dim);
    }
    .link-btn.primary:hover {
      background: rgba(139,159,196,0.22);
      border-color: rgba(139,159,196,0.4);
      color: #b8c8e4;
    }

    /* Footer */
    footer {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0.5;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrap">

  <img
    class="avatar"
    src="https://cdn.bsky.app/img/avatar/plain/did:plc:z73hvtpl2mmrsjvqaxfslx5g/bafkreic4lsmg66znie7x5kbabcmeh44ayeajthed6oo4afq7qxeuluyxeu@jpeg"
    alt="James Cochran"
  >

  <h1>James Cochran</h1>
  <div class="divider"></div>

  <div class="links">
    <a href="https://jamescochran.github.io/TwinStarsRando/" class="link-btn primary">
      Twin Stars Randomizer
    </a>
    <a href="https://bsky.app/profile/jamescochran.bsky.social" class="link-btn">
      Bluesky
    </a>
    <a href="https://ko-fi.com/jamescochran" class="link-btn">
      Ko-fi
    </a>
  </div>

  <footer>&copy; James Cochran</footer>

</div>

</body>
</html>
